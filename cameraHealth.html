function injectCSS(){
  if(document.getElementById("ch-style")) return;
  const s = document.createElement("style");
  s.id = "ch-style";
  s.textContent = CH_CSS;
  (document.head || document.documentElement).appendChild(s);
}
function removeCSS(){ const s=document.getElementById("ch-style"); if(s) s.remove(); }

/* ---------------- config (edit these) ----------------
   Camera health for integrated cameras (GO Focus Plus, Surfsight, SMARTER AI)
   is reported as StatusData VALUES on these diagnostics — NOT as MediaFile or
   FaultData. We resolve the diagnostic IDs by name (regex), read the latest
   value per device, and translate the numbers below. */
const CONFIG = {
  lookbackDays: 14,        // window for camera StatusData
  offlineHours: 24,        // GO device no DeviceStatusInfo contact within this => Offline
  staleHours: 72,          // no camera StatusData within this => "No recent camera data"
  cameraGroupIds: [],      // paste MyGeotab group IDs to limit scope; [] = all devices
  resultsLimit: 50000
};

/* UNIVERSAL camera diagnostics — present on BOTH providers (verified via probe). */
const DIAG = {
  health: /video device health/i,    // 0 Healthy,1 Unstable,2 Unhealthy,3 Not working
  conn:   /media device status/i     // 0 Offline,1 Online,2 Standby
};

/* PROVIDER-SPECIFIC camera diagnostics. Each is matched by name and used to (a)
   attribute the provider and (b) add drill-down issues. Types:
     connected  — value 0 Disconnected / 1 Connected
     calibration— value enum (0 Decalibrated … 4 Adjustment required)
     flag       — value 1 means the condition is present
   Add rows here as you find more camera diagnostics in the probe output. */
const SIGNALS = [
  // ---- GO Focus Plus / SMARTER AI ----
  {re:/iox.*camera|smarter ai camera/i,            prov:"gfp", type:"connected"},
  // ---- Surfsight by Lytx ----
  {re:/road-facing camera status/i,                prov:"ss",  type:"calibration"},
  {re:/camera lens obstruction/i,                  prov:"ss",  type:"flag", on:1, label:"Lens obstruction detected", sev:"warn", ds:"Camera lens obstruction detected."},
  {re:/camera vibration while in standby/i,        prov:"ss",  type:"flag", on:1, label:"Camera vibration (standby)", sev:"warn", ds:"Camera vibration detected while parked/standby."}
];

/* Value translations */
const HEALTH_TXT    = {0:"Healthy", 1:"Unstable", 2:"Unhealthy", 3:"Not working"};
const CONN_TXT      = {0:"Offline", 1:"Online", 2:"Standby"};
const CONNECTED_TXT = {0:"Disconnected", 1:"Connected"};
const CALIB_TXT     = {0:"Decalibrated", 1:"Calibration in progress", 2:"Calibration complete", 3:"Adjustment suggested", 4:"Adjustment required"};
const CALIB_ISS     = {0:["Camera decalibrated","bad"], 3:["Camera adjustment suggested","warn"], 4:["Camera adjustment required","bad"]};
const HEALTH_ISS    = {1:["Camera unstable","warn"], 2:["Camera unhealthy","bad"], 3:["Camera not working","bad"]};

const BUILD = "v3 · StatusData · 2026-06-09";   // visible in footer to confirm which build is live
const PROV_LABEL = {ss:"Surfsight by Lytx", gfp:"Geotab GO Focus Plus", other:"Camera"};
const STATUS = {ok:{t:"Healthy",cls:"ok"}, warn:{t:"Needs attention",cls:"warn"}, bad:{t:"Not working",cls:"bad"}, off:{t:"Offline",cls:"off"}};
const STATUS_RANK = {off:0, bad:1, warn:2, ok:3};

/* ---------------- state ---------------- */
let API = null, CAMS = [], lastSync = null;
let filter = {status:"", prov:"", q:""};
let sort = {key:"status", dir:1};
let view = "cam", selected = null, MODE = "live";

/* ---------------- helpers ---------------- */
const now = () => new Date();
const fmtDate = d => d ? d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "—";
const ago = d => { if(!d) return "never"; const h=Math.round((now()-d)/36e5); if(h<1)return "just now"; if(h<24)return h+"h ago"; return Math.round(h/24)+"d ago"; };
const provClass = p => p===PROV_LABEL.ss ? "ss" : p===PROV_LABEL.gfp ? "gfp" : "other";
const provShort = p => (p||"").replace("Geotab ","").replace(" by Lytx","") || "Camera";
function mk(key,code,sev,ds){ return {key:key,n:key,code:code,sev:sev,ds:ds,when:null,prov:"other"}; }
function buildIssues(c){
  const pc = provClass(c.prov);
  const add = (key,code,sev,ds)=>{ const i=mk(key,code,sev,ds); i.prov=pc; i.when=c.lastReport; c.iss.push(i); };
  if(c.connected===0) add("Camera disconnected","IOX camera = 0 (Disconnected)","bad","Camera not detected on the GO device IOX port.");
  if(c.conn===0) add("Camera offline","Media device status = 0 (Offline)","bad","Camera not reporting / not connected to the cloud.");
  else if(c.conn===2) add("Camera on standby","Media device status = 2 (Standby)","warn","Camera in standby (ignition off / power-save).");
  if(c.health && HEALTH_ISS[c.health]){ const r=HEALTH_ISS[c.health]; add(r[0],"Video device health = "+c.health+" ("+HEALTH_TXT[c.health]+")",r[1],"Native camera health reading from the device."); }
  if(c.calib!=null && CALIB_ISS[c.calib]){ const r=CALIB_ISS[c.calib]; add(r[0],"Road-facing camera status = "+c.calib+" ("+CALIB_TXT[c.calib]+")",r[1],"Road-facing camera calibration state."); }
  (c.extra||[]).forEach(e=>add(e.label,e.code,e.sev,e.ds));
  if(c.staleRec) add("No recent camera data","No camera StatusData in "+CONFIG.staleHours+"h","warn","Camera has not reported health/connectivity recently.");
}
function deriveStatus(c){
  const contactH = c.lastContact ? (now()-c.lastContact)/36e5 : Infinity;
  // staleRec + issues are computed before this (finalize order)
  // precedence: offline/disconnected > not working/unhealthy/critical issue > unstable/standby/stale/any issue > healthy
  if(c.connected===0 || c.conn===0 || contactH > CONFIG.offlineHours) return c.status="off";
  if(c.health===3 || c.health===2 || c.iss.some(i=>i.sev==="bad")) return c.status="bad";
  if(c.health===1 || c.conn===2 || c.iss.length>0 || c.staleRec) return c.status="warn";
  return c.status="ok";
}
// finalize: compute staleness, build issues, then derive status (order matters)
function finalize(c){
  c.staleRec = c.lastReport ? (now()-c.lastReport)/36e5 > CONFIG.staleHours : true;
  c.iss = [];
  buildIssues(c);
  deriveStatus(c);
}

/* ---------------- live data load ----------------
   Step 1: get Devices, DeviceStatusInfo, and the Diagnostic catalog.
   Step 2: resolve the camera diagnostic IDs by name, then pull the latest
           StatusData value per device for health / connectivity / connection. */
async function loadData(){
  if(MODE!=="live") return;
  setLoading();
  try{
    const t0 = now();
    const since = new Date(t0.getTime() - CONFIG.lookbackDays*864e5).toISOString();
    const deviceSearch = CONFIG.cameraGroupIds.length ? {groups: CONFIG.cameraGroupIds.map(id=>({id}))} : {};

    const [devices, dsi, diagnostics] = await API.multiCall([
      ["Get", {typeName:"Device", search:deviceSearch, resultsLimit:CONFIG.resultsLimit}],
      ["Get", {typeName:"DeviceStatusInfo", resultsLimit:CONFIG.resultsLimit}],
      ["Get", {typeName:"Diagnostic", resultsLimit:CONFIG.resultsLimit}]
    ]);

    // resolve target diagnostic ids by name: universal (health/conn) + provider signals
    const diagName={}; (diagnostics||[]).forEach(d=>{ diagName[d.id]=d.name||d.id; });
    const targetIds=[], meta={};   // meta[id] = {kind:"health"|"conn"|"signal", sig?}
    (diagnostics||[]).forEach(d=>{
      const n=d.name||"";
      if(DIAG.health.test(n)){ targetIds.push(d.id); meta[d.id]={kind:"health"}; return; }
      if(DIAG.conn.test(n)){   targetIds.push(d.id); meta[d.id]={kind:"conn"};   return; }
      for(const sig of SIGNALS){ if(sig.re.test(n)){ targetIds.push(d.id); meta[d.id]={kind:"signal",sig:sig}; return; } }
    });
    if(!targetIds.length){
      CAMS=[]; renderAll();
      return banner("warnb","<b>No camera diagnostics found.</b> Expected names like \"Video device health\" / \"Media device status\". Adjust the <code>DIAG</code> / <code>SIGNALS</code> matchers.");
    }

    // pull recent StatusData for each target diagnostic
    const sdResults = await API.multiCall(
      targetIds.map(id=>["Get",{typeName:"StatusData", search:{diagnosticSearch:{id:id}, fromDate:since}, resultsLimit:CONFIG.resultsLimit}])
    );

    CAMS = buildCameras(devices, dsi, sdResults, targetIds, meta, diagName);
    lastSync = now();
    renderAll();
    banner(CAMS.length ? null : "warnb", CAMS.length ? "" : "<b>No cameras reported in the last "+CONFIG.lookbackDays+" days.</b>");
  }catch(err){
    console.error("[CameraHealth] load failed", err);
    document.getElementById("tableHost").innerHTML='<div class="empty">Could not load data.</div>';
    banner("errb","<b>Failed to load data:</b> "+(err && err.message ? err.message : err)+". Check the user can read Device, DeviceStatusInfo, Diagnostic and StatusData.");
  }
}

function buildCameras(devices, dsi, sdResults, targetIds, meta, diagName){
  const statusByDev={}; (dsi||[]).forEach(s=>{ const id=s.device&&s.device.id; if(!id)return; statusByDev[id]={lastContact:s.dateTime?new Date(s.dateTime):null}; });
  const devById={}; (devices||[]).forEach(d=>{ devById[d.id]=d; });

  // accumulate the latest reading per device per diagnostic
  const acc={};
  (sdResults||[]).forEach((arr,i)=>{
    const id=targetIds[i], m=meta[id], nm=diagName[id];
    (arr||[]).forEach(s=>{
      const dev=s.device&&s.device.id; if(!dev)return;
      const when=s.dateTime?new Date(s.dateTime):null;
      const a=acc[dev]=acc[dev]||{lastReport:null, signals:{}, provVotes:{}};
      if(when && (!a.lastReport || when>a.lastReport)) a.lastReport=when;
      if(m.kind==="health" || m.kind==="conn"){
        const cur=a[m.kind];
        if(!cur || (when && (!cur.when || when>cur.when))) a[m.kind]={val:Number(s.data), when:when, name:nm};
      } else { // signal
        a.provVotes[m.sig.prov]=(a.provVotes[m.sig.prov]||0)+1;
        const cur=a.signals[id];
        if(!cur || (when && (!cur.when || when>cur.when))) a.signals[id]={val:Number(s.data), when:when, name:nm, sig:m.sig};
      }
    });
  });

  const cams=[];
  Object.keys(acc).forEach(devId=>{
    const dev=devById[devId]; if(!dev) return;          // not in current device scope/filter
    const a=acc[devId];
    const c={
      cam: dev.name||devId, serial: dev.serialNumber||devId, asset: dev.name||devId,
      vin: dev.vehicleIdentificationNumber||"—",
      prov: providerFor(a, dev),
      lastContact: (statusByDev[devId]||{}).lastContact || null,
      lastReport: a.lastReport || null,
      health: a.health ? a.health.val : null,
      conn: a.conn ? a.conn.val : null,
      connected: null, calib: null, extra: []
    };
    // resolve provider-specific signals into connected / calib / extra issues
    Object.keys(a.signals).forEach(id=>{
      const sg=a.signals[id], v=sg.val;
      if(sg.sig.type==="connected"){ c.connected=v; }
      else if(sg.sig.type==="calibration"){ c.calib=v; }
      else if(sg.sig.type==="flag" && v===(sg.sig.on!=null?sg.sig.on:1)){
        c.extra.push({label:sg.sig.label, code:sg.name+" = "+v, sev:sg.sig.sev||"warn", ds:sg.sig.ds||""});
      }
    });
    finalize(c);
    cams.push(c);
  });
  return cams;
}
function providerFor(a, dev){
  const votes=(a&&a.provVotes)||{};
  const top=Object.keys(votes).sort((x,y)=>votes[y]-votes[x])[0];
  if(top) return PROV_LABEL[top]||PROV_LABEL.other;
  const s=((dev.name||"")+" "+(dev.deviceType||"")).toLowerCase();
  if(/surfsight|lytx/.test(s)) return PROV_LABEL.ss;
  if(/smarter|focus/.test(s))  return PROV_LABEL.gfp;
  return PROV_LABEL.other;
}

/* ---------------- rendering ---------------- */
function counts(){ const c={all:CAMS.length,ok:0,warn:0,bad:0,off:0}; CAMS.forEach(x=>c[x.status]++); return c; }
function renderCards(){
  const c=counts();
  const defs=[{k:"",label:"All cameras",val:c.all,pip:"all"},{k:"ok",label:"Healthy",val:c.ok,pip:"ok"},{k:"warn",label:"Needs attention",val:c.warn,pip:"warn"},{k:"bad",label:"Not working",val:c.bad,pip:"bad"},{k:"off",label:"Offline",val:c.off,pip:"off"}];
  document.getElementById("cards").innerHTML=defs.map(d=>`<div class="card ${filter.status===d.k?"active":""}" data-status="${d.k}"><div class="k"><span class="pip ${d.pip}"></span>${d.label}</div><div class="v">${d.val}</div><div class="pct">${d.k?(c.all?Math.round(d.val/c.all*100):0)+"% of fleet":"monitored"}</div></div>`).join("");
  document.querySelectorAll("#chRoot .card").forEach(el=>el.onclick=()=>{ filter.status=filter.status===el.dataset.status?"":el.dataset.status; renderAll(); });
}
function renderDonut(){
  const c=counts(); const order=[["ok","--ok"],["warn","--warn"],["bad","--bad"],["off","--offline"]]; const total=c.all||1; let off=25, svg="";
  order.forEach(([k,varn])=>{ const pct=c[k]/total*100; svg+=`<circle r="15.9155" cx="21" cy="21" fill="transparent" stroke="var(${varn})" stroke-width="6" stroke-dasharray="${pct.toFixed(2)} ${(100-pct).toFixed(2)}" stroke-dashoffset="${off}"></circle>`; off=(off-pct+100)%100; });
  svg+=`<text x="21" y="20.5" text-anchor="middle" font-size="7" fill="var(--text)" font-weight="700">${c.all}</text><text x="21" y="26" text-anchor="middle" font-size="3.4" fill="var(--muted)">cameras</text>`;
  document.getElementById("donut").innerHTML=svg;
  document.getElementById("legend").innerHTML=order.map(([k])=>{const m=STATUS[k];return `<div><span class="pip ${m.cls}"></span>${m.t}<b>${c[k]}</b></div>`;}).join("");
}
function probAgg(){
  const map={};
  CAMS.forEach(c=>c.iss.forEach(i=>{ if(!map[i.key])map[i.key]={key:i.key,n:i.n,code:i.code,sev:i.sev,prov:PROV_LABEL[i.prov]||"Camera",cams:[]}; map[i.key].cams.push(c); }));
  return Object.values(map).sort((a,b)=>b.cams.length-a.cams.length);
}
function renderProbList(){
  const agg=probAgg(); const max=Math.max(1,...agg.map(a=>a.cams.length)); const host=document.getElementById("probList");
  host.innerHTML=agg.length?agg.slice(0,8).map(a=>`<div class="ptype" data-prob="${a.key}"><div class="row1"><span class="nm">${a.n}</span><span class="ct">${a.cams.length}</span></div><div class="bar"><i style="width:${a.cams.length/max*100}%"></i></div><div class="prov-tag">${a.code} · ${a.prov}</div></div>`).join(""):'<div class="empty" style="padding:18px">No active problems.</div>';
  host.querySelectorAll(".ptype").forEach(el=>el.onclick=()=>openProb(el.dataset.prob));
}
function filtered(){ return CAMS.filter(c=>{ if(filter.status&&c.status!==filter.status)return false; if(filter.prov&&c.prov!==filter.prov)return false; if(filter.q){const q=filter.q.toLowerCase(); if(![c.cam,c.asset,c.vin,c.serial,c.prov].join(" ").toLowerCase().includes(q))return false;} return true; }); }
function sortRows(rows){
  const k=sort.key;
  return rows.sort((a,b)=>{ let av,bv; if(k==="status"){av=STATUS_RANK[a.status];bv=STATUS_RANK[b.status];} else if(k==="lastReport"){av=a.lastReport||0;bv=b.lastReport||0;} else if(k==="lastContact"){av=a.lastContact||0;bv=b.lastContact||0;} else if(k==="iss"){av=a.iss.length;bv=b.iss.length;} else {av=(a[k]||"").toString().toLowerCase();bv=(b[k]||"").toString().toLowerCase();} return (av<bv?-1:av>bv?1:0)*sort.dir; });
}
const arr = k => sort.key===k?`<span class="arr">${sort.dir>0?"▲":"▼"}</span>`:"";
function renderTableCam(){
  const rows=sortRows(filtered());
  const head=`<table><thead><tr><th data-k="status">Status ${arr("status")}</th><th data-k="cam">Camera ${arr("cam")}</th><th data-k="asset">Asset / Vehicle ${arr("asset")}</th><th data-k="prov">Provider ${arr("prov")}</th><th data-k="lastReport">Last camera report ${arr("lastReport")}</th><th data-k="lastContact">Last contact ${arr("lastContact")}</th><th data-k="iss">Issues ${arr("iss")}</th></tr></thead><tbody>`;
  const body=rows.length?rows.map(c=>{const m=STATUS[c.status];return `<tr data-cam="${c.serial}" class="${selected===c.serial?"sel":""}"><td><span class="badge ${m.cls}">${m.t}</span></td><td><div class="cam">${c.cam}</div><div class="serial">${c.serial}</div></td><td><div class="asset">${c.asset}</div><div class="vin">VIN ${c.vin}</div></td><td><span class="prov"><span class="b ${provClass(c.prov)}"></span>${provShort(c.prov)}</span></td><td class="${c.staleRec?"stale":""}">${fmtDate(c.lastReport)}<div class="serial">${ago(c.lastReport)}</div></td><td class="${c.status==="off"?"stale":""}">${ago(c.lastContact)}</td><td><span class="issn ${c.iss.length?"":"zero"}">${c.iss.length||"0"}</span></td></tr>`;}).join(""):`<tr><td colspan="7"><div class="empty">No cameras match these filters.</div></td></tr>`;
  document.getElementById("tableHost").innerHTML=head+body+"</tbody></table>";
  document.querySelectorAll("#chRoot thead th").forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(sort.key===k)sort.dir*=-1;else{sort.key=k;sort.dir=1;}renderAll();});
  document.querySelectorAll("#chRoot tbody tr[data-cam]").forEach(tr=>tr.onclick=()=>openCam(tr.dataset.cam));
}
function renderTableProb(){
  const agg=probAgg().filter(a=>{ if(filter.prov&&a.prov!==filter.prov&&a.prov!=="Mixed")return false; if(filter.q&&!a.n.toLowerCase().includes(filter.q.toLowerCase()))return false; return true; });
  let html="";
  agg.forEach(a=>{ const sevcls=a.sev==="crit"?"bad":"warn"; html+=`<div style="border-bottom:1px solid var(--line)"><div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px"><div><span class="badge ${sevcls}" style="margin-right:8px">${a.sev==="crit"?"Critical":"Warning"}</span><b>${a.n}</b> <span class="serial code">${a.code}</span></div><span class="issn">${a.cams.length} camera${a.cams.length>1?"s":""}</span></div><table><tbody>`; a.cams.forEach(c=>{html+=`<tr data-cam="${c.serial}"><td style="width:150px"><div class="cam">${c.cam}</div><div class="serial">${c.serial}</div></td><td><div class="asset">${c.asset}</div></td><td><span class="prov"><span class="b ${provClass(c.prov)}"></span>${provShort(c.prov)}</span></td><td style="width:120px">Reported ${ago(c.lastReport)}</td></tr>`;}); html+="</tbody></table></div>"; });
  document.getElementById("tableHost").innerHTML=html||'<div class="empty">No problem types match.</div>';
  document.querySelectorAll("#chRoot tbody tr[data-cam]").forEach(tr=>tr.onclick=()=>openCam(tr.dataset.cam));
}
function openCam(serial){
  selected=serial; const c=CAMS.find(x=>x.serial===serial); if(!c)return; const m=STATUS[c.status];
  document.getElementById("dTitle").innerHTML=`${c.cam} <span class="badge ${m.cls}" style="font-size:11px;vertical-align:middle">${m.t}</span>`;
  document.getElementById("dSerial").textContent=c.serial+" · "+c.prov;
  let reasons=[]; if(c.status==="off")reasons.push("No contact for "+ago(c.lastContact)); if(c.staleRec)reasons.push("No camera data in over "+CONFIG.staleHours+"h");
  const issHtml=c.iss.length?c.iss.map(x=>`<div class="iss"><div class="it"><span class="nm">${x.n}</span><span class="sev ${x.sev==="crit"?"crit":"warnv"}">${x.sev==="crit"?"Critical":"Warning"}</span></div><div class="ds">${x.ds}</div><div class="mt"><span class="code">${x.code}</span><span>${x.when?ago(x.when):""}</span></div></div>`).join(""):'<div class="none">✓ No active diagnostics reported.</div>';
  const healthRow = c.health!=null ? `<span class="l">Camera health</span><span class="vv">${HEALTH_TXT[c.health]||c.health} (${c.health})</span>` : "";
  const connRow   = c.conn!=null ? `<span class="l">Media status</span><span class="vv">${CONN_TXT[c.conn]||c.conn} (${c.conn})</span>` : "";
  const connectedRow = c.connected!=null ? `<span class="l">IOX connection</span><span class="vv">${CONNECTED_TXT[c.connected]||c.connected} (${c.connected})</span>` : "";
  const calibRow = c.calib!=null ? `<span class="l">Calibration</span><span class="vv">${CALIB_TXT[c.calib]||c.calib} (${c.calib})</span>` : "";
  document.getElementById("dBody").innerHTML=`<div class="kv"><span class="l">Asset / Vehicle</span><span class="vv">${c.asset}</span><span class="l">VIN</span><span class="vv">${c.vin}</span><span class="l">Provider</span><span class="vv">${c.prov}</span><span class="l">Device serial</span><span class="vv">${c.serial}</span>${healthRow}${connRow}${connectedRow}${calibRow}<span class="l">Last contact</span><span class="vv">${fmtDate(c.lastContact)} · ${ago(c.lastContact)}</span><span class="l">Last camera report</span><span class="vv ${c.staleRec?"stale":""}">${fmtDate(c.lastReport)} · ${ago(c.lastReport)}</span>${reasons.length?`<span class="l">Status reason</span><span class="vv stale">${reasons.join(" · ")}</span>`:""}</div><div class="sechead">Diagnostics (${c.iss.length})</div>${issHtml}`;
  showDrawer(); renderTableCam();
}
function openProb(key){
  const a=probAgg().find(x=>x.key===key); if(!a)return; selected=null;
  document.getElementById("dTitle").innerHTML=`${a.n} <span class="badge ${a.sev==="crit"?"bad":"warn"}" style="font-size:11px;vertical-align:middle">${a.sev==="crit"?"Critical":"Warning"}</span>`;
  document.getElementById("dSerial").textContent=a.code+" · "+a.prov;
  document.getElementById("dBody").innerHTML=`<div class="sechead">Affected cameras (${a.cams.length})</div>${a.cams.map(c=>`<div class="iss" data-jump="${c.serial}" style="cursor:pointer"><div class="it"><span class="nm">${c.cam}</span><span class="badge ${STATUS[c.status].cls}" style="font-size:10.5px">${STATUS[c.status].t}</span></div><div class="ds">${c.asset} · ${provShort(c.prov)}</div><div class="mt"><span>Last report ${ago(c.lastReport)}</span><span>Last contact ${ago(c.lastContact)}</span></div></div>`).join("")}`;
  document.querySelectorAll("#chRoot [data-jump]").forEach(el=>el.onclick=()=>openCam(el.dataset.jump));
  showDrawer();
}
function showDrawer(){ document.getElementById("drawer").classList.add("open"); document.getElementById("scrim").classList.add("open"); }
function closeDrawer(){ document.getElementById("drawer").classList.remove("open"); document.getElementById("scrim").classList.remove("open"); selected=null; renderTableCam(); }
function setLoading(){ document.getElementById("tableHost").innerHTML='<div class="empty"><span class="spin"></span>Loading camera data…</div>'; }
function banner(kind,html){ const el=document.getElementById("banner"); el.innerHTML=kind?`<div class="banner ${kind}">${html}</div>`:""; }
function renderProviderFilter(){ const provs=[...new Set(CAMS.map(c=>c.prov))].sort(); const sel=document.getElementById("provFilter"); const cur=sel.value; sel.innerHTML='<option value="">All providers</option>'+provs.map(p=>`<option value="${p}">${p}</option>`).join(""); sel.value=cur; }
function renderFooter(){ document.getElementById("footer").innerHTML='Live mapping: camera health from StatusData <code>Video device health</code> (0 Healthy…3 Not working) · connectivity from <code>Media device status</code> (0 Offline,1 Online,2 Standby) · <code>IOX camera</code> connection state · <code>DeviceStatusInfo</code> last contact · <code>Device</code> asset &amp; VIN. Window: last '+CONFIG.lookbackDays+' days · offline &gt;'+CONFIG.offlineHours+'h · stale &gt;'+CONFIG.staleHours+'h. &nbsp;·&nbsp; <b>Build '+BUILD+'</b>'; }
function renderAll(){ renderCards(); renderDonut(); renderProbList(); renderProviderFilter(); renderFooter(); view==="cam"?renderTableCam():renderTableProb(); document.getElementById("refreshLabel").textContent=MODE==="preview"?"Preview data":(lastSync?("Synced "+ago(lastSync)):"—"); }

/* ---------------- UI bindings ---------------- */
function bindUI(){
  document.getElementById("dClose").onclick=closeDrawer;
  document.getElementById("scrim").onclick=closeDrawer;
  document.getElementById("reloadBtn").onclick=()=>{ MODE==="live"?loadData():renderAll(); };
  document.querySelectorAll("#viewSeg button").forEach(b=>b.onclick=()=>{ view=b.dataset.view; document.querySelectorAll("#viewSeg button").forEach(x=>x.classList.toggle("active",x===b)); renderAll(); });
  document.getElementById("search").oninput=e=>{filter.q=e.target.value;renderAll();};
  document.getElementById("provFilter").onchange=e=>{filter.prov=e.target.value;renderAll();};
}

/* ---------------- bootstrap ---------------- */
if (typeof geotab !== "undefined" && geotab.addin) {
  geotab.addin.cameraHealth = function () {
    return {
      initialize: function (api, state, callback) { API=api; MODE="live"; injectCSS(); bindUI(); callback(); },
      focus: function (api, state) { API=api; injectCSS(); loadData(); },
      blur: function () { removeCSS(); }
    };
  };
} else {
  MODE="preview";
  window.addEventListener("DOMContentLoaded", function(){
    injectCSS(); bindUI();
    CAMS=SAMPLE_CAMS(); CAMS.forEach(finalize); lastSync=now(); renderAll();
    banner("info","<b>Preview mode</b> — sample data because the page is not embedded in MyGeotab. Inside MyGeotab it reads live camera StatusData (<code>Video device health</code> / <code>Media device status</code>) per device.");
  });
}

/* ---------------- sample data (preview only) ---------------- */
function SAMPLE_CAMS(){
  const dt=(d,h=0)=>new Date(now().getTime()-d*864e5-h*36e5);
  const SS=PROV_LABEL.ss, GFP=PROV_LABEL.gfp;
  // health:0 Healthy,1 Unstable,2 Unhealthy,3 Not working · conn:0 Offline,1 Online,2 Standby

  const lens=[{label:"Lens obstruction detected",code:"Camera lens obstruction detected = 1",sev:"warn",ds:"Camera lens obstruction detected."}];
  return [
    C("Austin","G94X0JHSV95N","Austin","1GT49REY…2210",SS, .5, 3, 0,1,null,2),                 // Surfsight, healthy, calibrated
    C("Cab-1188","SSC-7741881","Truck 1188","1XPBD49X1…0097",SS, .6, 5, 1,1,null,2),            // unstable
    C("Cab-1219","SSC-7742190","Van 1219","WD3PE8CD5…5560",SS, 2, 30, null,0,null,2),           // offline
    C("Cab-1224","SSC-7742244","Truck 1224","1FUJGLDR8…9001",SS, .4, 8, 0,1,null,4),            // adjustment required (bad)
    C("Cab-1251","SSC-7742510","Reefer 1251","1UYVS2538…4471",SS, .7, 6, 0,1,null,2,lens),      // lens obstruction (warn)
    C("GFP-2010","G9F-4410021","Truck 2010","1HGCM82633…0010",GFP, .2, 1, 0,1,1),
    C("GFP-2021","G9F-4410210","Pickup 2021","1FTFW1ET5…7210",GFP, .3, 3, 1,1,1),               // unstable
    C("GFP-2033","G9F-4410330","Truck 2033","1HGCM82633…0330",GFP, 3, 4, 3,1,1),                // not working
    C("GFP-2039","G9F-4410391","Van 2039","2C4RDGBG9…9039",GFP, 50, 50, null,1,0),              // disconnected + device offline
    C("GFP-2058","G9F-4410581","Pickup 2058","1FTFW1ET3…7580",GFP, .5, 100, 0,1,1),             // stale report
    C("GFP-2070","G9F-4410701","Reefer 2070","1UYVS2532…4470",GFP, 1.5, 4, 0,2,1)               // standby
  ];
}
