<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera Health</title>
<style>
  :root{
    --bg:#0f1623; --panel:#16202f; --panel-2:#1c2839; --line:#26344a;
    --text:#e7eef7; --muted:#93a4bd; --faint:#6c7d97;
    --accent:#4c8dff; --accent-2:#2f6fe0;
    --ok:#2ecf83; --ok-bg:rgba(46,207,131,.12);
    --warn:#f6b73c; --warn-bg:rgba(246,183,60,.12);
    --bad:#ff5d6c; --bad-bg:rgba(255,93,108,.12);
    --offline:#8b9bb4; --offline-bg:rgba(139,155,180,.12);
    --radius:12px; --shadow:0 6px 24px rgba(0,0,0,.28);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  .ch-root{background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;min-height:100%}
  .ch-root a{color:var(--accent)}
  .wrap{max-width:1280px;margin:0 auto;padding:22px}
  header.top{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:6px}
  h1{font-size:20px;margin:0;font-weight:650;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
  .refresh{color:var(--faint);font-size:12px;display:flex;align-items:center;gap:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 4px var(--ok-bg)}
  .btn{background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12.5px}
  .btn:hover{border-color:var(--accent-2)}

  .banner{border-radius:8px;padding:10px 14px;font-size:12.5px;margin:14px 0 18px;border:1px solid var(--line)}
  .banner.info{background:var(--panel);border-left:3px solid var(--accent);color:var(--muted)}
  .banner.warnb{background:var(--warn-bg);border-left:3px solid var(--warn);color:var(--text)}
  .banner.errb{background:var(--bad-bg);border-left:3px solid var(--bad);color:var(--text)}
  .banner b{color:var(--text)}
  .banner code{font-family:ui-monospace,Menlo,monospace}

  .cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:.15s}
  .card:hover{border-color:var(--accent-2);transform:translateY(-1px)}
  .card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .card .k{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .card .v{font-size:30px;font-weight:680;margin-top:6px;letter-spacing:.5px}
  .card .pct{font-size:11.5px;color:var(--faint);margin-top:2px}
  .pip{width:9px;height:9px;border-radius:50%}
  .pip.ok{background:var(--ok)} .pip.warn{background:var(--warn)} .pip.bad{background:var(--bad)} .pip.off{background:var(--offline)} .pip.all{background:var(--accent)}

  .grid{display:grid;grid-template-columns:1fr 320px;gap:16px}
  @media(max-width:980px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .panel h2{font-size:13px;font-weight:620;margin:0;padding:13px 16px;border-bottom:1px solid var(--line);color:var(--text);display:flex;align-items:center;justify-content:space-between}
  .panel h2 .hint{font-weight:400;color:var(--faint);font-size:11.5px}

  .controls{display:flex;flex-wrap:wrap;gap:9px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .controls input,.controls select{background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;outline:none}
  .controls input{flex:1;min-width:160px}
  .controls input::placeholder{color:var(--faint)}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:var(--panel-2);border:0;color:var(--muted);padding:8px 13px;cursor:pointer;font-size:12.5px}
  .seg button.active{background:var(--accent);color:#fff}

  table{width:100%;border-collapse:collapse}
  thead th{position:sticky;top:0;background:var(--panel-2);text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
  thead th .arr{color:var(--accent);font-size:10px}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr{cursor:pointer;transition:.1s}
  tbody tr:hover{background:var(--panel-2)}
  tbody tr.sel{background:rgba(76,141,255,.10)}
  .cam{font-weight:560} .serial{color:var(--faint);font-size:11.5px;margin-top:1px}
  .asset{color:var(--text)} .vin{color:var(--faint);font-size:11.5px;margin-top:1px}
  .prov{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted)}
  .prov .b{width:7px;height:7px;border-radius:2px}
  .b.ss{background:#c66bff} .b.gfp{background:#4cc6ff} .b.other{background:#8b9bb4}
  .stale{color:var(--warn)}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:20px;font-size:12px;font-weight:560;white-space:nowrap}
  .badge.ok{background:var(--ok-bg);color:var(--ok)} .badge.warn{background:var(--warn-bg);color:var(--warn)}
  .badge.bad{background:var(--bad-bg);color:var(--bad)} .badge.off{background:var(--offline-bg);color:var(--offline)}
  .issn{background:var(--bad-bg);color:var(--bad);border-radius:20px;padding:2px 8px;font-size:11.5px;font-weight:600}
  .issn.zero{background:var(--ok-bg);color:var(--ok)}

  .donutwrap{display:flex;align-items:center;gap:14px;padding:16px}
  .legend{font-size:12.5px;display:flex;flex-direction:column;gap:7px}
  .legend div{display:flex;align-items:center;gap:8px;color:var(--muted)}
  .legend b{color:var(--text);margin-left:auto;font-variant-numeric:tabular-nums}
  .ptype{padding:11px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .ptype:hover{background:var(--panel-2)}
  .ptype .row1{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .ptype .nm{font-size:13px} .ptype .ct{font-size:12px;color:var(--bad);font-weight:600}
  .bar{height:5px;background:var(--panel-2);border-radius:4px;margin-top:7px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--bad),var(--warn))}
  .prov-tag{font-size:10.5px;color:var(--faint);margin-top:3px}

  .drawer{position:fixed;top:0;right:0;height:100%;width:430px;max-width:92vw;background:var(--panel);border-left:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(105%);transition:.22s cubic-bezier(.4,0,.2,1);z-index:40;display:flex;flex-direction:column}
  .drawer.open{transform:translateX(0)}
  .drawer .dh{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .drawer .dh h3{margin:0;font-size:16px}
  .drawer .x{background:none;border:0;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
  .drawer .body{padding:16px 18px;overflow:auto}
  .kv{display:grid;grid-template-columns:128px 1fr;gap:6px 10px;font-size:13px;margin-bottom:16px}
  .kv .l{color:var(--muted)} .kv .vv{color:var(--text)}
  .sechead{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:6px 0 9px}
  .iss{border:1px solid var(--line);border-radius:9px;padding:11px 12px;margin-bottom:9px;background:var(--panel-2)}
  .iss .it{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .iss .nm{font-weight:560;font-size:13px}
  .iss .sev{font-size:10.5px;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
  .sev.crit{background:var(--bad-bg);color:var(--bad)} .sev.warnv{background:var(--warn-bg);color:var(--warn)}
  .iss .ds{color:var(--muted);font-size:12.5px;margin-top:6px}
  .iss .mt{color:var(--faint);font-size:11px;margin-top:6px;display:flex;justify-content:space-between}
  .iss .code{font-family:ui-monospace,Menlo,monospace}
  .none{color:var(--ok);font-size:13px;padding:8px 0}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.22s;z-index:30}
  .scrim.open{opacity:1;pointer-events:auto}
  .footer{color:var(--faint);font-size:11.5px;margin-top:16px;line-height:1.6}
  .footer code{background:var(--panel);padding:1px 6px;border-radius:5px;border:1px solid var(--line);color:var(--muted)}
  .empty{padding:36px;text-align:center;color:var(--faint)}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-3px;margin-right:7px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="ch-root">
  <div class="wrap">
    <header class="top">
      <div>
        <h1>Fleet Camera Health</h1>
        <div class="sub">Surfsight by Lytx &amp; Geotab GO Focus Plus · across all assets</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn" id="reloadBtn">Reload</button>
        <div class="refresh"><span class="dot"></span><span id="refreshLabel">—</span></div>
      </div>
    </header>

    <div id="banner"></div>

    <div class="cards" id="cards"></div>

    <div class="grid">
      <div class="panel">
        <div class="controls">
          <input id="search" placeholder="Search camera, asset, VIN, serial…">
          <select id="provFilter"><option value="">All providers</option></select>
          <div class="seg" id="viewSeg">
            <button data-view="cam" class="active">By camera</button>
            <button data-view="prob">By problem type</button>
          </div>
        </div>
        <div id="tableHost"><div class="empty"><span class="spin"></span>Loading camera data…</div></div>
      </div>

      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="panel">
          <h2>Status mix</h2>
          <div class="donutwrap"><svg id="donut" width="120" height="120" viewBox="0 0 42 42"></svg><div class="legend" id="legend"></div></div>
        </div>
        <div class="panel">
          <h2>Top problem types <span class="hint">cameras affected</span></h2>
          <div id="probList"></div>
        </div>
      </div>
    </div>

    <div class="footer" id="footer"></div>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer">
  <div class="dh"><div><h3 id="dTitle"></h3><div class="serial" id="dSerial"></div></div><button class="x" id="dClose">×</button></div>
  <div class="body" id="dBody"></div>
</aside>

<script>
"use strict";
/* =========================================================================
   MyGeotab "Camera Health" Add-In
   -------------------------------------------------------------------------
   Computes online/offline + last recording + active diagnostics for every
   camera in the fleet and renders a drill-down report.

   Data sources (live, via the injected MyGeotab `api`):
     • Device           -> asset/vehicle name, VIN, serial, deviceType
     • DeviceStatusInfo -> isDeviceCommunicating + dateTime (online/offline, last contact)
     • MediaFile        -> last recording date per device
     • FaultData        -> active diagnostics  (joined to Diagnostic for names)

   >>> EDIT THE `CONFIG` AND `NAME_RULES` BLOCKS BELOW to match your database. <<<
   The defaults work generically, but tuning camera detection + diagnostic
   grouping against YOUR portal is what makes the report accurate. Open the
   browser console while the page is loaded: it prints every unmapped
   diagnostic name it sees on camera devices so you can add rules for them.
   ========================================================================= */

const CONFIG = {
  lookbackDays: 14,          // window for faults + recordings
  offlineHours: 24,          // no DeviceStatusInfo contact within this => Offline
  staleRecordingHours: 72,   // no MediaFile within this => "needs attention"

  // OPTIONAL: limit to specific groups (paste MyGeotab group IDs, e.g. "b123").
  // Leave empty [] to scan all devices and auto-detect cameras (see isCamera()).
  cameraGroupIds: [],

  // A device counts as a camera if ANY of these are true:
  //   - it is in cameraGroupIds (above)
  //   - it produced a MediaFile in the lookback window
  //   - its name matches cameraNameRegex (set to null to disable)
  //   - it has a fault whose diagnostic matches a NAME_RULES camera rule
  cameraNameRegex: null,     // e.g. /cam|dashcam|surfsight|focus/i

  resultsLimit: 50000
};

/* Map raw MyGeotab Diagnostic NAMES -> friendly problem type, provider, severity.
   Matched top-to-bottom by case-insensitive regex against the diagnostic name.
   Provider: "ss" = Surfsight by Lytx, "gfp" = GO Focus Plus, "other" = generic.
   Severity: "crit" (Not working) or "warn" (Needs attention).
   Add/adjust rows as you discover the real diagnostic names in your DB. */
const NAME_RULES = [
  // ---- Surfsight by Lytx ----
  {re:/surfsight.*offline|offline.*surfsight|camera.*offline/i, prov:"ss",  sev:"crit", label:"Camera offline"},
  {re:/upload|cloud.*fail|failed.*upload/i,                     prov:"ss",  sev:"crit", label:"Video upload failure"},
  {re:/sd.*card|storage.*error|media.*error/i,                  prov:"ss",  sev:"crit", label:"SD card error"},
  {re:/storage.*full|disk.*full/i,                              prov:"ss",  sev:"warn", label:"Storage full"},
  {re:/gps.*lost|no.*gps|gps.*signal/i,                         prov:"ss",  sev:"warn", label:"GPS signal lost"},
  {re:/obstruct|tamper|blocked|covered/i,                       prov:"ss",  sev:"warn", label:"Lens obstruction / tampering"},
  // ---- GO Focus Plus ----
  {re:/calibrat/i,                                              prov:"gfp", sev:"warn", label:"Calibration required"},
  {re:/iox|harness|not.*detected|disconnect/i,                  prov:"gfp", sev:"crit", label:"IOX harness disconnected"},
  {re:/voltage|power|under.?volt/i,                             prov:"gfp", sev:"crit", label:"Insufficient power"},
  {re:/recording.*fail|no.*recording|record.*error/i,          prov:"gfp", sev:"crit", label:"Recording failure"},
  {re:/lens|focus.*obstruct/i,                                  prov:"gfp", sev:"warn", label:"Lens obstructed"},
  {re:/cellular|signal|connectivity/i,                          prov:"gfp", sev:"warn", label:"Cellular connectivity degraded"},
  // ---- generic camera ----
  {re:/firmware|update/i,                                       prov:"other", sev:"warn", label:"Firmware update required"},
  {re:/camera|video|dashcam/i,                                  prov:"other", sev:"warn", label:"Camera diagnostic"}
];

const PROV_LABEL = {ss:"Surfsight by Lytx", gfp:"Geotab GO Focus Plus", other:"Camera"};
const STATUS = {ok:{t:"Healthy",cls:"ok"}, warn:{t:"Needs attention",cls:"warn"}, bad:{t:"Not working",cls:"bad"}, off:{t:"Offline",cls:"off"}};
const STATUS_RANK = {off:0, bad:1, warn:2, ok:3};

/* ===================== state ===================== */
let API = null;
let CAMS = [];
let filter = {status:"", prov:"", q:""};
let sort = {key:"status", dir:1};
let view = "cam";
let selected = null;
let lastSync = null;
let MODE = "live"; // "live" | "preview"

/* ===================== helpers ===================== */
const now = () => new Date();
const fmtDate = d => d ? d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "—";
const ago = d => {
  if(!d) return "never";
  const h = Math.round((now()-d)/36e5);
  if(h<1) return "just now";
  if(h<24) return h+"h ago";
  return Math.round(h/24)+"d ago";
};
const provClass = p => p===PROV_LABEL.ss ? "ss" : p===PROV_LABEL.gfp ? "gfp" : "other";
const provShort = p => (p||"").replace("Geotab ","").replace(" by Lytx","") || "Camera";

function classifyDiag(name){
  for(const r of NAME_RULES){ if(r.re.test(name||"")) return r; }
  return null;
}
function deriveStatus(c){
  const contactH = c.lastContact ? (now()-c.lastContact)/36e5 : Infinity;
  const recH = c.lastRec ? (now()-c.lastRec)/36e5 : Infinity;
  const hasCrit = c.iss.some(i=>i.sev==="crit");
  c.staleRec = recH > CONFIG.staleRecordingHours;
  if(contactH > CONFIG.offlineHours) return c.status="off";
  if(hasCrit) return c.status="bad";
  if(c.iss.length>0 || c.staleRec) return c.status="warn";
  return c.status="ok";
}

/* ===================== live data load ===================== */
async function loadData(){
  if(MODE!=="live"){ return; }
  setLoading();
  try{
    const t0 = now();
    const since = new Date(t0.getTime() - CONFIG.lookbackDays*864e5).toISOString();
    const deviceSearch = CONFIG.cameraGroupIds.length
      ? {groups: CONFIG.cameraGroupIds.map(id=>({id}))} : {};

    const [devices, dsi, faults, diagnostics, media] = await API.multiCall([
      ["Get", {typeName:"Device", search:deviceSearch, resultsLimit:CONFIG.resultsLimit}],
      ["Get", {typeName:"DeviceStatusInfo", resultsLimit:CONFIG.resultsLimit}],
      ["Get", {typeName:"FaultData", search:{fromDate:since}, resultsLimit:CONFIG.resultsLimit}],
      ["Get", {typeName:"Diagnostic", resultsLimit:CONFIG.resultsLimit}],
      ["Get", {typeName:"MediaFile", search:{fromDate:since, toDate:t0.toISOString()}, resultsLimit:CONFIG.resultsLimit}]
    ]);

    CAMS = buildCameras(devices, dsi, faults, diagnostics, media);
    lastSync = now();
    if(!CAMS.length){
      renderAll();
      banner("warnb","<b>No cameras detected.</b> Adjust <code>CONFIG.cameraGroupIds</code> or <code>cameraNameRegex</code>, or confirm your fleet has MediaFile/camera fault data in the last "+CONFIG.lookbackDays+" days.");
    } else {
      renderAll();
      banner(null);
    }
  }catch(err){
    console.error("[CameraHealth] load failed", err);
    document.getElementById("tableHost").innerHTML =
      '<div class="empty">Could not load data.</div>';
    banner("errb","<b>Failed to load data:</b> "+(err && err.message ? err.message : err)+". Check the security clearance has access to Device, DeviceStatusInfo, FaultData and MediaFile.");
  }
}

function buildCameras(devices, dsi, faults, diagnostics, media){
  // index diagnostics id -> name
  const diagName = {};
  (diagnostics||[]).forEach(d=>{ diagName[d.id] = d.name || d.id; });

  // index status info by device id
  const statusByDev = {};
  (dsi||[]).forEach(s=>{
    const id = s.device && s.device.id; if(!id) return;
    statusByDev[id] = {
      communicating: s.isDeviceCommunicating,
      lastContact: s.dateTime ? new Date(s.dateTime) : null
    };
  });

  // latest media (recording) per device, + which devices have media
  const lastRecByDev = {}, hasMedia = {};
  (media||[]).forEach(m=>{
    const id = m.device && m.device.id; if(!id) return;
    hasMedia[id] = true;
    const end = m.toDate || m.fromDate;
    if(end){ const d = new Date(end); if(!lastRecByDev[id] || d>lastRecByDev[id]) lastRecByDev[id]=d; }
  });

  // faults per device, classified
  const unmapped = new Set();
  const issuesByDev = {}, hasCamFault = {};
  (faults||[]).forEach(f=>{
    const id = f.device && f.device.id; if(!id) return;
    const did = f.diagnostic && f.diagnostic.id;
    const name = diagName[did] || (did||"Unknown diagnostic");
    const rule = classifyDiag(name);
    if(!rule) return; // not camera-related (will be skipped); still recorded below if device is camera
    hasCamFault[id] = true;
    const when = f.dateActive || f.dateTime || f.lastActive || null;
    (issuesByDev[id] = issuesByDev[id] || []).push({
      key: rule.label, n: rule.label, code: name, sev: rule.sev,
      prov: rule.prov, ds: "Reported diagnostic: \""+name+"\".",
      when: when ? new Date(when) : null
    });
  });

  const groupIds = new Set(CONFIG.cameraGroupIds);
  const inGroup = dev => (dev.groups||[]).some(g=>groupIds.has(g.id));

  const cams = [];
  (devices||[]).forEach(dev=>{
    const id = dev.id;
    const isCam =
      (groupIds.size && inGroup(dev)) ||
      hasMedia[id] ||
      hasCamFault[id] ||
      (CONFIG.cameraNameRegex && CONFIG.cameraNameRegex.test(dev.name||""));
    if(!isCam) return;

    const iss = (issuesByDev[id]||[]);
    // de-duplicate identical problem types, keep most recent
    const dedup = {};
    iss.forEach(i=>{ if(!dedup[i.key] || (i.when && dedup[i.key].when && i.when>dedup[i.key].when)) dedup[i.key]=i; });
    const issues = Object.values(dedup);

    // provider: majority vote from issues, else heuristic from name/type
    let prov = providerFromIssues(issues);
    if(!prov) prov = providerFromDevice(dev);

    const st = statusByDev[id] || {};
    const c = {
      cam: dev.name || id,
      serial: dev.serialNumber || id,
      asset: dev.name || id,
      vin: dev.vehicleIdentificationNumber || "—",
      prov,
      lastContact: st.lastContact || null,
      lastRec: lastRecByDev[id] || null,
      iss: issues
    };
    deriveStatus(c);
    cams.push(c);
  });

  // log unmapped camera-ish diagnostics for tuning
  if(unmapped.size) console.info("[CameraHealth] unmapped diagnostics:", [...unmapped]);
  return cams;
}

function providerFromIssues(issues){
  const votes = {}; issues.forEach(i=>{ if(i.prov && i.prov!=="other") votes[i.prov]=(votes[i.prov]||0)+1; });
  const top = Object.keys(votes).sort((a,b)=>votes[b]-votes[a])[0];
  return top ? PROV_LABEL[top] : null;
}
function providerFromDevice(dev){
  const s = ((dev.name||"")+" "+(dev.deviceType||"")).toLowerCase();
  if(/surfsight|lytx/.test(s)) return PROV_LABEL.ss;
  if(/focus/.test(s)) return PROV_LABEL.gfp;
  return PROV_LABEL.other;
}

/* ===================== rendering ===================== */
function counts(){ const c={all:CAMS.length,ok:0,warn:0,bad:0,off:0}; CAMS.forEach(x=>c[x.status]++); return c; }

function renderCards(){
  const c=counts();
  const defs=[
    {k:"",label:"All cameras",val:c.all,pip:"all"},
    {k:"ok",label:"Healthy",val:c.ok,pip:"ok"},
    {k:"warn",label:"Needs attention",val:c.warn,pip:"warn"},
    {k:"bad",label:"Not working",val:c.bad,pip:"bad"},
    {k:"off",label:"Offline",val:c.off,pip:"off"}
  ];
  document.getElementById("cards").innerHTML = defs.map(d=>`
    <div class="card ${filter.status===d.k?"active":""}" data-status="${d.k}">
      <div class="k"><span class="pip ${d.pip}"></span>${d.label}</div>
      <div class="v">${d.val}</div>
      <div class="pct">${d.k?(c.all?Math.round(d.val/c.all*100):0)+"% of fleet":"monitored"}</div>
    </div>`).join("");
  document.querySelectorAll(".card").forEach(el=>el.onclick=()=>{
    filter.status = filter.status===el.dataset.status?"":el.dataset.status; renderAll();
  });
}

function renderDonut(){
  const c=counts(); const order=[["ok","--ok"],["warn","--warn"],["bad","--bad"],["off","--offline"]];
  const total=c.all||1; let off=25, svg="";
  order.forEach(([k,varn])=>{
    const pct=c[k]/total*100;
    svg+=`<circle r="15.9155" cx="21" cy="21" fill="transparent" stroke="var(${varn})" stroke-width="6" stroke-dasharray="${pct.toFixed(2)} ${(100-pct).toFixed(2)}" stroke-dashoffset="${off}"></circle>`;
    off=(off-pct+100)%100;
  });
  svg+=`<text x="21" y="20.5" text-anchor="middle" font-size="7" fill="var(--text)" font-weight="700">${c.all}</text><text x="21" y="26" text-anchor="middle" font-size="3.4" fill="var(--muted)">cameras</text>`;
  document.getElementById("donut").innerHTML=svg;
  document.getElementById("legend").innerHTML = order.map(([k])=>{const m=STATUS[k];return `<div><span class="pip ${m.cls}"></span>${m.t}<b>${c[k]}</b></div>`;}).join("");
}

function probAgg(){
  const map={};
  CAMS.forEach(c=>c.iss.forEach(i=>{
    if(!map[i.key]) map[i.key]={key:i.key,n:i.n,code:i.code,sev:i.sev,prov:PROV_LABEL[i.prov]||"Camera",cams:[]};
    map[i.key].cams.push(c);
  }));
  const stale = CAMS.filter(c=>c.staleRec && !c.iss.some(i=>/recording|upload/i.test(i.n)));
  if(stale.length) map._stale={key:"_stale",n:"No recent recording",code:"MEDIA-STALE",sev:"warn",prov:"Mixed",cams:stale};
  return Object.values(map).sort((a,b)=>b.cams.length-a.cams.length);
}
function renderProbList(){
  const agg=probAgg(); const max=Math.max(1,...agg.map(a=>a.cams.length));
  const host=document.getElementById("probList");
  host.innerHTML = agg.length ? agg.slice(0,8).map(a=>`
    <div class="ptype" data-prob="${a.key}">
      <div class="row1"><span class="nm">${a.n}</span><span class="ct">${a.cams.length}</span></div>
      <div class="bar"><i style="width:${a.cams.length/max*100}%"></i></div>
      <div class="prov-tag">${a.code} · ${a.prov}</div>
    </div>`).join("") : '<div class="empty" style="padding:18px">No active problems.</div>';
  host.querySelectorAll(".ptype").forEach(el=>el.onclick=()=>openProb(el.dataset.prob));
}

function filtered(){
  return CAMS.filter(c=>{
    if(filter.status && c.status!==filter.status) return false;
    if(filter.prov && c.prov!==filter.prov) return false;
    if(filter.q){const q=filter.q.toLowerCase();
      if(![c.cam,c.asset,c.vin,c.serial,c.prov].join(" ").toLowerCase().includes(q)) return false;}
    return true;
  });
}
function sortRows(rows){
  const k=sort.key;
  return rows.sort((a,b)=>{
    let av,bv;
    if(k==="status"){av=STATUS_RANK[a.status];bv=STATUS_RANK[b.status];}
    else if(k==="lastRec"){av=a.lastRec||0;bv=b.lastRec||0;}
    else if(k==="lastContact"){av=a.lastContact||0;bv=b.lastContact||0;}
    else if(k==="iss"){av=a.iss.length;bv=b.iss.length;}
    else {av=(a[k]||"").toString().toLowerCase();bv=(b[k]||"").toString().toLowerCase();}
    return (av<bv?-1:av>bv?1:0)*sort.dir;
  });
}
const arr = k => sort.key===k?`<span class="arr">${sort.dir>0?"▲":"▼"}</span>`:"";
function renderTableCam(){
  const rows=sortRows(filtered());
  const head=`<table><thead><tr>
    <th data-k="status">Status ${arr("status")}</th>
    <th data-k="cam">Camera ${arr("cam")}</th>
    <th data-k="asset">Asset / Vehicle ${arr("asset")}</th>
    <th data-k="prov">Provider ${arr("prov")}</th>
    <th data-k="lastRec">Last recording ${arr("lastRec")}</th>
    <th data-k="lastContact">Last contact ${arr("lastContact")}</th>
    <th data-k="iss">Issues ${arr("iss")}</th>
  </tr></thead><tbody>`;
  const body = rows.length ? rows.map(c=>{const m=STATUS[c.status];return `
    <tr data-cam="${c.serial}" class="${selected===c.serial?"sel":""}">
      <td><span class="badge ${m.cls}">${m.t}</span></td>
      <td><div class="cam">${c.cam}</div><div class="serial">${c.serial}</div></td>
      <td><div class="asset">${c.asset}</div><div class="vin">VIN ${c.vin}</div></td>
      <td><span class="prov"><span class="b ${provClass(c.prov)}"></span>${provShort(c.prov)}</span></td>
      <td class="${c.staleRec?"stale":""}">${fmtDate(c.lastRec)}<div class="serial">${ago(c.lastRec)}</div></td>
      <td class="${c.status==="off"?"stale":""}">${ago(c.lastContact)}</td>
      <td><span class="issn ${c.iss.length?"":"zero"}">${c.iss.length||"0"}</span></td>
    </tr>`;}).join("") : `<tr><td colspan="7"><div class="empty">No cameras match these filters.</div></td></tr>`;
  document.getElementById("tableHost").innerHTML = head+body+"</tbody></table>";
  document.querySelectorAll("thead th").forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(sort.key===k)sort.dir*=-1;else{sort.key=k;sort.dir=1;}renderAll();});
  document.querySelectorAll("tbody tr[data-cam]").forEach(tr=>tr.onclick=()=>openCam(tr.dataset.cam));
}
function renderTableProb(){
  const agg=probAgg().filter(a=>{
    if(filter.prov && a.prov!==filter.prov && a.prov!=="Mixed") return false;
    if(filter.q && !a.n.toLowerCase().includes(filter.q.toLowerCase())) return false;
    return true;
  });
  let html="";
  agg.forEach(a=>{
    const sevcls=a.sev==="crit"?"bad":"warn";
    html+=`<div style="border-bottom:1px solid var(--line)">
      <div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px">
        <div><span class="badge ${sevcls}" style="margin-right:8px">${a.sev==="crit"?"Critical":"Warning"}</span><b>${a.n}</b> <span class="serial code">${a.code}</span></div>
        <span class="issn">${a.cams.length} camera${a.cams.length>1?"s":""}</span>
      </div><table><tbody>`;
    a.cams.forEach(c=>{html+=`<tr data-cam="${c.serial}">
      <td style="width:150px"><div class="cam">${c.cam}</div><div class="serial">${c.serial}</div></td>
      <td><div class="asset">${c.asset}</div></td>
      <td><span class="prov"><span class="b ${provClass(c.prov)}"></span>${provShort(c.prov)}</span></td>
      <td style="width:120px">Last rec ${ago(c.lastRec)}</td></tr>`;});
    html+="</tbody></table></div>";
  });
  document.getElementById("tableHost").innerHTML = html || '<div class="empty">No problem types match.</div>';
  document.querySelectorAll("tbody tr[data-cam]").forEach(tr=>tr.onclick=()=>openCam(tr.dataset.cam));
}

function openCam(serial){
  selected=serial; const c=CAMS.find(x=>x.serial===serial); if(!c)return;
  const m=STATUS[c.status];
  document.getElementById("dTitle").innerHTML=`${c.cam} <span class="badge ${m.cls}" style="font-size:11px;vertical-align:middle">${m.t}</span>`;
  document.getElementById("dSerial").textContent=c.serial+" · "+c.prov;
  let reasons=[];
  if(c.status==="off") reasons.push("No contact for "+ago(c.lastContact));
  if(c.staleRec) reasons.push("No recording in over "+CONFIG.staleRecordingHours+"h");
  const issHtml = c.iss.length ? c.iss.map(x=>`
    <div class="iss"><div class="it"><span class="nm">${x.n}</span><span class="sev ${x.sev==="crit"?"crit":"warnv"}">${x.sev==="crit"?"Critical":"Warning"}</span></div>
    <div class="ds">${x.ds}</div>
    <div class="mt"><span class="code">${x.code}</span><span>${x.when?ago(x.when):""}</span></div></div>`).join("")
    : '<div class="none">✓ No active diagnostics reported.</div>';
  document.getElementById("dBody").innerHTML=`
    <div class="kv">
      <span class="l">Asset / Vehicle</span><span class="vv">${c.asset}</span>
      <span class="l">VIN</span><span class="vv">${c.vin}</span>
      <span class="l">Provider</span><span class="vv">${c.prov}</span>
      <span class="l">Device serial</span><span class="vv">${c.serial}</span>
      <span class="l">Last contact</span><span class="vv">${fmtDate(c.lastContact)} · ${ago(c.lastContact)}</span>
      <span class="l">Last recording</span><span class="vv ${c.staleRec?"stale":""}">${fmtDate(c.lastRec)} · ${ago(c.lastRec)}</span>
      ${reasons.length?`<span class="l">Status reason</span><span class="vv stale">${reasons.join(" · ")}</span>`:""}
    </div>
    <div class="sechead">Diagnostics (${c.iss.length})</div>${issHtml}`;
  showDrawer(); renderTableCam();
}
function openProb(key){
  const a=probAgg().find(x=>x.key===key); if(!a)return; selected=null;
  document.getElementById("dTitle").innerHTML=`${a.n} <span class="badge ${a.sev==="crit"?"bad":"warn"}" style="font-size:11px;vertical-align:middle">${a.sev==="crit"?"Critical":"Warning"}</span>`;
  document.getElementById("dSerial").textContent=a.code+" · "+a.prov;
  document.getElementById("dBody").innerHTML=`
    <div class="sechead">Affected cameras (${a.cams.length})</div>
    ${a.cams.map(c=>`<div class="iss" data-jump="${c.serial}" style="cursor:pointer">
      <div class="it"><span class="nm">${c.cam}</span><span class="badge ${STATUS[c.status].cls}" style="font-size:10.5px">${STATUS[c.status].t}</span></div>
      <div class="ds">${c.asset} · ${provShort(c.prov)}</div>
      <div class="mt"><span>Last recording ${ago(c.lastRec)}</span><span>Last contact ${ago(c.lastContact)}</span></div></div>`).join("")}`;
  document.querySelectorAll("[data-jump]").forEach(el=>el.onclick=()=>openCam(el.dataset.jump));
  showDrawer();
}
function showDrawer(){document.getElementById("drawer").classList.add("open");document.getElementById("scrim").classList.add("open");}
function closeDrawer(){document.getElementById("drawer").classList.remove("open");document.getElementById("scrim").classList.remove("open");selected=null;renderTableCam();}

function setLoading(){document.getElementById("tableHost").innerHTML='<div class="empty"><span class="spin"></span>Loading camera data…</div>';}
function banner(kind,html){
  const el=document.getElementById("banner");
  if(!kind){el.innerHTML="";return;}
  el.innerHTML=`<div class="banner ${kind}">${html}</div>`;
}
function renderProviderFilter(){
  const provs=[...new Set(CAMS.map(c=>c.prov))].sort();
  const sel=document.getElementById("provFilter");
  const cur=sel.value;
  sel.innerHTML='<option value="">All providers</option>'+provs.map(p=>`<option value="${p}">${p}</option>`).join("");
  sel.value=cur;
}
function renderFooter(){
  document.getElementById("footer").innerHTML =
    'Live mapping: <code>Get DeviceStatusInfo</code> → online/offline + last contact · '+
    '<code>Get MediaFile</code> → last recording · <code>Get FaultData</code> + <code>Diagnostic</code> → drill-down · '+
    '<code>Get Device</code> → asset &amp; VIN. Window: last '+CONFIG.lookbackDays+' days · offline >'+CONFIG.offlineHours+'h · stale recording >'+CONFIG.staleRecordingHours+'h.';
}
function renderAll(){
  renderCards(); renderDonut(); renderProbList(); renderProviderFilter(); renderFooter();
  view==="cam"?renderTableCam():renderTableProb();
  const lbl=document.getElementById("refreshLabel");
  lbl.textContent = MODE==="preview" ? "Preview data" : (lastSync?("Synced "+ago(lastSync)):"—");
}

/* ===================== UI bindings ===================== */
function bindUI(){
  document.getElementById("dClose").onclick=closeDrawer;
  document.getElementById("scrim").onclick=closeDrawer;
  document.getElementById("reloadBtn").onclick=()=>{ MODE==="live"?loadData():renderAll(); };
  document.querySelectorAll("#viewSeg button").forEach(b=>b.onclick=()=>{
    view=b.dataset.view;
    document.querySelectorAll("#viewSeg button").forEach(x=>x.classList.toggle("active",x===b));
    renderAll();
  });
  document.getElementById("search").oninput=e=>{filter.q=e.target.value;renderAll();};
  document.getElementById("provFilter").onchange=e=>{filter.prov=e.target.value;renderAll();};
}

/* ===================== bootstrap ===================== */
if (typeof geotab !== "undefined" && geotab.addin) {
  // Running inside MyGeotab — register the add-in lifecycle.
  geotab.addin.cameraHealth = function () {
    return {
      initialize: function (api, state, callback) {
        API = api; MODE = "live"; bindUI(); callback();
      },
      focus: function (api, state) {
        API = api; loadData();
      },
      blur: function () {}
    };
  };
} else {
  // Standalone preview (GitHub Pages / local file) — render sample data.
  MODE = "preview";
  window.addEventListener("DOMContentLoaded", function(){
    bindUI();
    CAMS = SAMPLE_CAMS();
    CAMS.forEach(deriveStatus);
    lastSync = now();
    renderAll();
    banner("info","<b>Preview mode</b> — showing sample data because the page is not embedded in MyGeotab. Inside MyGeotab it loads live <code>Device</code> / <code>DeviceStatusInfo</code> / <code>FaultData</code> / <code>MediaFile</code>.");
  });
}
