<!-- NOTE: MyGeotab injects this body into its own DOM and DISCARDS <head>.
     So all CSS is injected from JS (injectCSS) and scoped under .ch-root. -->
<div class="ch-root" id="chRoot">
  <div class="wrap">
    <header class="top">
      <div>
        <h1>Fleet Camera Health</h1>
        <div class="sub">Surfsight by Lytx &amp; Geotab GO Focus Plus · across all assets</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn" id="reloadBtn">Reload</button>
        <div class="refresh"><span class="dot"></span><span id="refreshLabel">—</span></div>
      </div>
    </header>

    <div id="banner"></div>

    <div class="cards" id="cards"></div>

    <div class="grid">
      <div class="panel">
        <div class="controls">
          <input id="search" placeholder="Search camera, asset, VIN, serial…">
          <select id="provFilter"><option value="">All providers</option></select>

      </div>

        </div>
        <div class="panel">
          <h2>Top problem types <span class="hint">cameras affected</span></h2>
          <div id="probList"></div>
        </div>
      </div>
    </div>

    <div class="footer" id="footer"></div>
  </div>

  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer">
    <div class="dh"><div><h3 id="dTitle"></h3><div class="serial" id="dSerial"></div></div><button class="x" id="dClose">×</button></div>
    <div class="body" id="dBody"></div>
  </aside>
</div>

"use strict";

   MyGeotab "Camera Health" Add-In
   -------------------------------------------------------------------------
   MyGeotab embeds this page's <body> into its own DOM and strips the <head>,
   so styles MUST be injected from JS (see injectCSS) and are scoped under
   .ch-root so they neither break nor are broken by the MyGeotab UI.

   Data sources (live, via the injected MyGeotab `api`):
     • Device           -> asset/vehicle name, VIN, serial, deviceType
     • DeviceStatusInfo -> isDeviceCommunicating + dateTime (online/offline, last contact)
     • MediaFile        -> last recording date per device
     • FaultData        -> active diagnostics (joined to Diagnostic for names)

   >>> EDIT THE `CONFIG` AND `NAME_RULES` BLOCKS to match your database. <<<
   Open the browser console while the page is loaded: it prints every unmapped
   diagnostic name it sees on camera devices so you can add rules for them.
   ========================================================================= */

function injectCSS(){
  if(document.getElementById("ch-style")) return;
  const s = document.createElement("style");
  s.id = "ch-style";
  s.textContent = CH_CSS;
  (document.head || document.documentElement).appendChild(s);
}
function removeCSS(){ const s=document.getElementById("ch-style"); if(s) s.remove(); }

/* ---------------- config (edit these) ---------------- */
const CONFIG = {
  lookbackDays: 14,
  offlineHours: 24,
  staleRecordingHours: 72,
  cameraGroupIds: [],          // paste MyGeotab group IDs to limit scope; [] = auto-detect
  cameraNameRegex: null,       // e.g. /cam|dashcam|surfsight|focus/i
  resultsLimit: 50000
};

const NAME_RULES = [
  {re:/surfsight.*offline|offline.*surfsight|camera.*offline/i, prov:"ss",  sev:"crit", label:"Camera offline"},
  {re:/upload|cloud.*fail|failed.*upload/i,                     prov:"ss",  sev:"crit", label:"Video upload failure"},
  {re:/sd.*card|storage.*error|media.*error/i,                  prov:"ss",  sev:"crit", label:"SD card error"},
  {re:/storage.*full|disk.*full/i,                              prov:"ss",  sev:"warn", label:"Storage full"},
  {re:/gps.*lost|no.*gps|gps.*signal/i,                         prov:"ss",  sev:"warn", label:"GPS signal lost"},
  {re:/obstruct|tamper|blocked|covered/i,                       prov:"ss",  sev:"warn", label:"Lens obstruction / tampering"},
  {re:/calibrat/i,                                              prov:"gfp", sev:"warn", label:"Calibration required"},
  {re:/iox|harness|not.*detected|disconnect/i,                  prov:"gfp", sev:"crit", label:"IOX harness disconnected"},
  {re:/voltage|power|under.?volt/i,                             prov:"gfp", sev:"crit", label:"Insufficient power"},
  {re:/recording.*fail|no.*recording|record.*error/i,          prov:"gfp", sev:"crit", label:"Recording failure"},
  {re:/lens|focus.*obstruct/i,                                  prov:"gfp", sev:"warn", label:"Lens obstructed"},
  {re:/cellular|signal|connectivity/i,                          prov:"gfp", sev:"warn", label:"Cellular connectivity degraded"},
  {re:/firmware|update/i,                                       prov:"other", sev:"warn", label:"Firmware update required"},
  {re:/camera|video|dashcam/i,                                  prov:"other", sev:"warn", label:"Camera diagnostic"}
];

const PROV_LABEL = {ss:"Surfsight by Lytx", gfp:"Geotab GO Focus Plus", other:"Camera"};
const STATUS = {ok:{t:"Healthy",cls:"ok"}, warn:{t:"Needs attention",cls:"warn"}, bad:{t:"Not working",cls:"bad"}, off:{t:"Offline",cls:"off"}};
const STATUS_RANK = {off:0, bad:1, warn:2, ok:3};

/* ---------------- state ---------------- */
let API = null, CAMS = [], lastSync = null;
let filter = {status:"", prov:"", q:""};
let sort = {key:"status", dir:1};
let view = "cam", selected = null, MODE = "live";

/* ---------------- helpers ---------------- */
const now = () => new Date();
const fmtDate = d => d ? d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "—";
const ago = d => { if(!d) return "never"; const h=Math.round((now()-d)/36e5); if(h<1)return "just now"; if(h<24)return h+"h ago"; return Math.round(h/24)+"d ago"; };
const provClass = p => p===PROV_LABEL.ss ? "ss" : p===PROV_LABEL.gfp ? "gfp" : "other";
const provShort = p => (p||"").replace("Geotab ","").replace(" by Lytx","") || "Camera";
function classifyDiag(name){ for(const r of NAME_RULES){ if(r.re.test(name||"")) return r; } return null; }
function deriveStatus(c){
  const contactH = c.lastContact ? (now()-c.lastContact)/36e5 : Infinity;
  const recH = c.lastRec ? (now()-c.lastRec)/36e5 : Infinity;
  const hasCrit = c.iss.some(i=>i.sev==="crit");
  c.staleRec = recH > CONFIG.staleRecordingHours;
  if(contactH > CONFIG.offlineHours) return c.status="off";
  if(hasCrit) return c.status="bad";
  if(c.iss.length>0 || c.staleRec) return c.status="warn";
  return c.status="ok";
}

/* ---------------- live data load ---------------- */
async function loadData(){
  if(MODE!=="live") return;
  setLoading();
  try{
    const t0 = now();
    const since = new Date(t0.getTime() - CONFIG.lookbackDays*864e5).toISOString();
    const deviceSearch = CONFIG.cameraGroupIds.length ? {groups: CONFIG.cameraGroupIds.map(id=>({id}))} : {};
    const [devices, dsi, faults, diagnostics, media] = await API.multiCall([
      ["Get", {typeName:"Device", search:deviceSearch, resultsLimit:CONFIG.resultsLimit}],
      ["Get", {typeName:"DeviceStatusInfo", resultsLimit:CONFIG.resultsLimit}],
      ["Get", {typeName:"FaultData", search:{fromDate:since}, resultsLimit:CONFIG.resultsLimit}],
      ["Get", {typeName:"Diagnostic", resultsLimit:CONFIG.resultsLimit}],
      ["Get", {typeName:"MediaFile", search:{fromDate:since, toDate:t0.toISOString()}, resultsLimit:CONFIG.resultsLimit}]
    ]);
    CAMS = buildCameras(devices, dsi, faults, diagnostics, media);
    lastSync = now();
    renderAll();
    if(!CAMS.length) banner("warnb","<b>No cameras detected.</b> Adjust <code>CONFIG.cameraGroupIds</code> or <code>cameraNameRegex</code>, or confirm MediaFile/camera fault data exists in the last "+CONFIG.lookbackDays+" days.");
    else banner(null);
  }catch(err){
    console.error("[CameraHealth] load failed", err);
    document.getElementById("tableHost").innerHTML='<div class="empty">Could not load data.</div>';
    banner("errb","<b>Failed to load data:</b> "+(err && err.message ? err.message : err)+". Check the security clearance can read Device, DeviceStatusInfo, FaultData and MediaFile.");
  }
}

function buildCameras(devices, dsi, faults, diagnostics, media){
  const diagName={}; (diagnostics||[]).forEach(d=>{ diagName[d.id]=d.name||d.id; });
  const statusByDev={}; (dsi||[]).forEach(s=>{ const id=s.device&&s.device.id; if(!id)return; statusByDev[id]={communicating:s.isDeviceCommunicating, lastContact:s.dateTime?new Date(s.dateTime):null}; });
  const lastRecByDev={}, hasMedia={};
  (media||[]).forEach(m=>{ const id=m.device&&m.device.id; if(!id)return; hasMedia[id]=true; const end=m.toDate||m.fromDate; if(end){const d=new Date(end); if(!lastRecByDev[id]||d>lastRecByDev[id])lastRecByDev[id]=d;} });
  const unmapped=new Set(), issuesByDev={}, hasCamFault={};
  (faults||[]).forEach(f=>{
    const id=f.device&&f.device.id; if(!id)return;
    const did=f.diagnostic&&f.diagnostic.id;
    const name=diagName[did]||(did||"Unknown diagnostic");
    const rule=classifyDiag(name);
    if(!rule){ unmapped.add(name); return; }
    hasCamFault[id]=true;
    const when=f.dateActive||f.dateTime||f.lastActive||null;
    (issuesByDev[id]=issuesByDev[id]||[]).push({key:rule.label,n:rule.label,code:name,sev:rule.sev,prov:rule.prov,ds:'Reported diagnostic: "'+name+'".',when:when?new Date(when):null});
  });
  const groupIds=new Set(CONFIG.cameraGroupIds);
  const inGroup=dev=>(dev.groups||[]).some(g=>groupIds.has(g.id));
  const cams=[];
  (devices||[]).forEach(dev=>{
    const id=dev.id;
    const isCam=(groupIds.size&&inGroup(dev))||hasMedia[id]||hasCamFault[id]||(CONFIG.cameraNameRegex&&CONFIG.cameraNameRegex.test(dev.name||""));
    if(!isCam) return;
    const dedup={};
    (issuesByDev[id]||[]).forEach(i=>{ if(!dedup[i.key]||(i.when&&dedup[i.key].when&&i.when>dedup[i.key].when))dedup[i.key]=i; });
    const issues=Object.values(dedup);
    let prov=providerFromIssues(issues); if(!prov) prov=providerFromDevice(dev);
    const st=statusByDev[id]||{};
    const c={cam:dev.name||id, serial:dev.serialNumber||id, asset:dev.name||id, vin:dev.vehicleIdentificationNumber||"—", prov, lastContact:st.lastContact||null, lastRec:lastRecByDev[id]||null, iss:issues};
    deriveStatus(c); cams.push(c);
  });
  if(unmapped.size) console.info("[CameraHealth] unmapped diagnostics (add NAME_RULES to surface):", [...unmapped]);
  return cams;
}
function providerFromIssues(issues){ const v={}; issues.forEach(i=>{ if(i.prov&&i.prov!=="other")v[i.prov]=(v[i.prov]||0)+1; }); const t=Object.keys(v).sort((a,b)=>v[b]-v[a])[0]; return t?PROV_LABEL[t]:null; }
function providerFromDevice(dev){ const s=((dev.name||"")+" "+(dev.deviceType||"")).toLowerCase(); if(/surfsight|lytx/.test(s))return PROV_LABEL.ss; if(/focus/.test(s))return PROV_LABEL.gfp; return PROV_LABEL.other; }

/* ---------------- rendering ---------------- */
function counts(){ const c={all:CAMS.length,ok:0,warn:0,bad:0,off:0}; CAMS.forEach(x=>c[x.status]++); return c; }
function renderCards(){
  const c=counts();
  const defs=[{k:"",label:"All cameras",val:c.all,pip:"all"},{k:"ok",label:"Healthy",val:c.ok,pip:"ok"},{k:"warn",label:"Needs attention",val:c.warn,pip:"warn"},{k:"bad",label:"Not working",val:c.bad,pip:"bad"},{k:"off",label:"Offline",val:c.off,pip:"off"}];
  document.getElementById("cards").innerHTML=defs.map(d=>`<div class="card ${filter.status===d.k?"active":""}" data-status="${d.k}"><div class="k"><span class="pip ${d.pip}"></span>${d.label}</div><div class="v">${d.val}</div><div class="pct">${d.k?(c.all?Math.round(d.val/c.all*100):0)+"% of fleet":"monitored"}</div></div>`).join("");
  document.querySelectorAll("#chRoot .card").forEach(el=>el.onclick=()=>{ filter.status=filter.status===el.dataset.status?"":el.dataset.status; renderAll(); });
}
function renderDonut(){
  const c=counts(); const order=[["ok","--ok"],["warn","--warn"],["bad","--bad"],["off","--offline"]]; const total=c.all||1; let off=25, svg="";
  order.forEach(([k,varn])=>{ const pct=c[k]/total*100; svg+=`<circle r="15.9155" cx="21" cy="21" fill="transparent" stroke="var(${varn})" stroke-width="6" stroke-dasharray="${pct.toFixed(2)} ${(100-pct).toFixed(2)}" stroke-dashoffset="${off}"></circle>`; off=(off-pct+100)%100; });
  svg+=`<text x="21" y="20.5" text-anchor="middle" font-size="7" fill="var(--text)" font-weight="700">${c.all}</text><text x="21" y="26" text-anchor="middle" font-size="3.4" fill="var(--muted)">cameras</text>`;
  document.getElementById("donut").innerHTML=svg;
  document.getElementById("legend").innerHTML=order.map(([k])=>{const m=STATUS[k];return `<div><span class="pip ${m.cls}"></span>${m.t}<b>${c[k]}</b></div>`;}).join("");
}
function probAgg(){
  const map={};
  CAMS.forEach(c=>c.iss.forEach(i=>{ if(!map[i.key])map[i.key]={key:i.key,n:i.n,code:i.code,sev:i.sev,prov:PROV_LABEL[i.prov]||"Camera",cams:[]}; map[i.key].cams.push(c); }));
  const stale=CAMS.filter(c=>c.staleRec&&!c.iss.some(i=>/recording|upload/i.test(i.n)));
  if(stale.length) map._stale={key:"_stale",n:"No recent recording",code:"MEDIA-STALE",sev:"warn",prov:"Mixed",cams:stale};
  return Object.values(map).sort((a,b)=>b.cams.length-a.cams.length);
}
function renderProbList(){
  const agg=probAgg(); const max=Math.max(1,...agg.map(a=>a.cams.length)); const host=document.getElementById("probList");
  host.innerHTML=agg.length?agg.slice(0,8).map(a=>`<div class="ptype" data-prob="${a.key}"><div class="row1"><span class="nm">${a.n}</span><span class="ct">${a.cams.length}</span></div><div class="bar"><i style="width:${a.cams.length/max*100}%"></i></div><div class="prov-tag">${a.code} · ${a.prov}</div></div>`).join(""):'<div class="empty" style="padding:18px">No active problems.</div>';
  host.querySelectorAll(".ptype").forEach(el=>el.onclick=()=>openProb(el.dataset.prob));
}
function filtered(){ return CAMS.filter(c=>{ if(filter.status&&c.status!==filter.status)return false; if(filter.prov&&c.prov!==filter.prov)return false; if(filter.q){const q=filter.q.toLowerCase(); if(![c.cam,c.asset,c.vin,c.serial,c.prov].join(" ").toLowerCase().includes(q))return false;} return true; }); }
function sortRows(rows){
  const k=sort.key;
  return rows.sort((a,b)=>{ let av,bv; if(k==="status"){av=STATUS_RANK[a.status];bv=STATUS_RANK[b.status];} else if(k==="lastRec"){av=a.lastRec||0;bv=b.lastRec||0;} else if(k==="lastContact"){av=a.lastContact||0;bv=b.lastContact||0;} else if(k==="iss"){av=a.iss.length;bv=b.iss.length;} else {av=(a[k]||"").toString().toLowerCase();bv=(b[k]||"").toString().toLowerCase();} return (av<bv?-1:av>bv?1:0)*sort.dir; });
}
const arr = k => sort.key===k?`<span class="arr">${sort.dir>0?"▲":"▼"}</span>`:"";
function renderTableCam(){
  const rows=sortRows(filtered());
  const head=`<table><thead><tr><th data-k="status">Status ${arr("status")}</th><th data-k="cam">Camera ${arr("cam")}</th><th data-k="asset">Asset / Vehicle ${arr("asset")}</th><th data-k="prov">Provider ${arr("prov")}</th><th data-k="lastRec">Last recording ${arr("lastRec")}</th><th data-k="lastContact">Last contact ${arr("lastContact")}</th><th data-k="iss">Issues ${arr("iss")}</th></tr></thead><tbody>`;
  const body=rows.length?rows.map(c=>{const m=STATUS[c.status];return `<tr data-cam="${c.serial}" class="${selected===c.serial?"sel":""}"><td><span class="badge ${m.cls}">${m.t}</span></td><td><div class="cam">${c.cam}</div><div class="serial">${c.serial}</div></td><td><div class="asset">${c.asset}</div><div class="vin">VIN ${c.vin}</div></td><td><span class="prov"><span class="b ${provClass(c.prov)}"></span>${provShort(c.prov)}</span></td><td class="${c.staleRec?"stale":""}">${fmtDate(c.lastRec)}<div class="serial">${ago(c.lastRec)}</div></td><td class="${c.status==="off"?"stale":""}">${ago(c.lastContact)}</td><td><span class="issn ${c.iss.length?"":"zero"}">${c.iss.length||"0"}</span></td></tr>`;}).join(""):`<tr><td colspan="7"><div class="empty">No cameras match these filters.</div></td></tr>`;
  document.getElementById("tableHost").innerHTML=head+body+"</tbody></table>";
  document.querySelectorAll("#chRoot thead th").forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(sort.key===k)sort.dir*=-1;else{sort.key=k;sort.dir=1;}renderAll();});
  document.querySelectorAll("#chRoot tbody tr[data-cam]").forEach(tr=>tr.onclick=()=>openCam(tr.dataset.cam));
}
function renderTableProb(){
  const agg=probAgg().filter(a=>{ if(filter.prov&&a.prov!==filter.prov&&a.prov!=="Mixed")return false; if(filter.q&&!a.n.toLowerCase().includes(filter.q.toLowerCase()))return false; return true; });
  let html="";
  agg.forEach(a=>{ const sevcls=a.sev==="crit"?"bad":"warn"; html+=`<div style="border-bottom:1px solid var(--line)"><div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px"><div><span class="badge ${sevcls}" style="margin-right:8px">${a.sev==="crit"?"Critical":"Warning"}</span><b>${a.n}</b> <span class="serial code">${a.code}</span></div><span class="issn">${a.cams.length} camera${a.cams.length>1?"s":""}</span></div><table><tbody>`; a.cams.forEach(c=>{html+=`<tr data-cam="${c.serial}"><td style="width:150px"><div class="cam">${c.cam}</div><div class="serial">${c.serial}</div></td><td><div class="asset">${c.asset}</div></td><td><span class="prov"><span class="b ${provClass(c.prov)}"></span>${provShort(c.prov)}</span></td><td style="width:120px">Last rec ${ago(c.lastRec)}</td></tr>`;}); html+="</tbody></table></div>"; });
  document.getElementById("tableHost").innerHTML=html||'<div class="empty">No problem types match.</div>';
  document.querySelectorAll("#chRoot tbody tr[data-cam]").forEach(tr=>tr.onclick=()=>openCam(tr.dataset.cam));
}
function openCam(serial){
  selected=serial; const c=CAMS.find(x=>x.serial===serial); if(!c)return; const m=STATUS[c.status];
  document.getElementById("dTitle").innerHTML=`${c.cam} <span class="badge ${m.cls}" style="font-size:11px;vertical-align:middle">${m.t}</span>`;
  document.getElementById("dSerial").textContent=c.serial+" · "+c.prov;
  let reasons=[]; if(c.status==="off")reasons.push("No contact for "+ago(c.lastContact)); if(c.staleRec)reasons.push("No recording in over "+CONFIG.staleRecordingHours+"h");
  const issHtml=c.iss.length?c.iss.map(x=>`<div class="iss"><div class="it"><span class="nm">${x.n}</span><span class="sev ${x.sev==="crit"?"crit":"warnv"}">${x.sev==="crit"?"Critical":"Warning"}</span></div><div class="ds">${x.ds}</div><div class="mt"><span class="code">${x.code}</span><span>${x.when?ago(x.when):""}</span></div></div>`).join(""):'<div class="none">✓ No active diagnostics reported.</div>';
  document.getElementById("dBody").innerHTML=`<div class="kv"><span class="l">Asset / Vehicle</span><span class="vv">${c.asset}</span><span class="l">VIN</span><span class="vv">${c.vin}</span><span class="l">Provider</span><span class="vv">${c.prov}</span><span class="l">Device serial</span><span class="vv">${c.serial}</span><span class="l">Last contact</span><span class="vv">${fmtDate(c.lastContact)} · ${ago(c.lastContact)}</span><span class="l">Last recording</span><span class="vv ${c.staleRec?"stale":""}">${fmtDate(c.lastRec)} · ${ago(c.lastRec)}</span>${reasons.length?`<span class="l">Status reason</span><span class="vv stale">${reasons.join(" · ")}</span>`:""}</div><div class="sechead">Diagnostics (${c.iss.length})</div>${issHtml}`;
  showDrawer(); renderTableCam();
}
function openProb(key){
  const a=probAgg().find(x=>x.key===key); if(!a)return; selected=null;
  document.getElementById("dTitle").innerHTML=`${a.n} <span class="badge ${a.sev==="crit"?"bad":"warn"}" style="font-size:11px;vertical-align:middle">${a.sev==="crit"?"Critical":"Warning"}</span>`;
  document.getElementById("dSerial").textContent=a.code+" · "+a.prov;
  document.getElementById("dBody").innerHTML=`<div class="sechead">Affected cameras (${a.cams.length})</div>${a.cams.map(c=>`<div class="iss" data-jump="${c.serial}" style="cursor:pointer"><div class="it"><span class="nm">${c.cam}</span><span class="badge ${STATUS[c.status].cls}" style="font-size:10.5px">${STATUS[c.status].t}</span></div><div class="ds">${c.asset} · ${provShort(c.prov)}</div><div class="mt"><span>Last recording ${ago(c.lastRec)}</span><span>Last contact ${ago(c.lastContact)}</span></div></div>`).join("")}`;
  document.querySelectorAll("#chRoot [data-jump]").forEach(el=>el.onclick=()=>openCam(el.dataset.jump));
  showDrawer();
}
function showDrawer(){ document.getElementById("drawer").classList.add("open"); document.getElementById("scrim").classList.add("open"); }
function closeDrawer(){ document.getElementById("drawer").classList.remove("open"); document.getElementById("scrim").classList.remove("open"); selected=null; renderTableCam(); }
function setLoading(){ document.getElementById("tableHost").innerHTML='<div class="empty"><span class="spin"></span>Loading camera data…</div>'; }
function banner(kind,html){ const el=document.getElementById("banner"); el.innerHTML=kind?`<div class="banner ${kind}">${html}</div>`:""; }
function renderProviderFilter(){ const provs=[...new Set(CAMS.map(c=>c.prov))].sort(); const sel=document.getElementById("provFilter"); const cur=sel.value; sel.innerHTML='<option value="">All providers</option>'+provs.map(p=>`<option value="${p}">${p}</option>`).join(""); sel.value=cur; }
function renderFooter(){ document.getElementById("footer").innerHTML='Live mapping: <code>Get DeviceStatusInfo</code> → online/offline + last contact · <code>Get MediaFile</code> → last recording · <code>Get FaultData</code> + <code>Diagnostic</code> → drill-down · <code>Get Device</code> → asset &amp; VIN. Window: last '+CONFIG.lookbackDays+' days · offline &gt;'+CONFIG.offlineHours+'h · stale recording &gt;'+CONFIG.staleRecordingHours+'h.'; }
function renderAll(){ renderCards(); renderDonut(); renderProbList(); renderProviderFilter(); renderFooter(); view==="cam"?renderTableCam():renderTableProb(); document.getElementById("refreshLabel").textContent=MODE==="preview"?"Preview data":(lastSync?("Synced "+ago(lastSync)):"—"); }

/* ---------------- UI bindings ---------------- */
function bindUI(){
  document.getElementById("dClose").onclick=closeDrawer;
  document.getElementById("scrim").onclick=closeDrawer;
  document.getElementById("reloadBtn").onclick=()=>{ MODE==="live"?loadData():renderAll(); };
  document.querySelectorAll("#viewSeg button").forEach(b=>b.onclick=()=>{ view=b.dataset.view; document.querySelectorAll("#viewSeg button").forEach(x=>x.classList.toggle("active",x===b)); renderAll(); });
  document.getElementById("search").oninput=e=>{filter.q=e.target.value;renderAll();};
  document.getElementById("provFilter").onchange=e=>{filter.prov=e.target.value;renderAll();};
}

/* ---------------- bootstrap ---------------- */
if (typeof geotab !== "undefined" && geotab.addin) {
  geotab.addin.cameraHealth = function () {
    return {
      initialize: function (api, state, callback) { API=api; MODE="live"; injectCSS(); bindUI(); callback(); },
      focus: function (api, state) { API=api; injectCSS(); loadData(); },
      blur: function () { removeCSS(); }
    };
  };
} else {
  MODE="preview";
  window.addEventListener("DOMContentLoaded", function(){
    injectCSS(); bindUI();
    CAMS=SAMPLE_CAMS(); CAMS.forEach(deriveStatus); lastSync=now(); renderAll();
    banner("info","<b>Preview mode</b> — sample data because the page is not embedded in MyGeotab. Inside MyGeotab it loads live <code>Device</code> / <code>DeviceStatusInfo</code> / <code>FaultData</code> / <code>MediaFile</code>.");
  });
}
